<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King Cell – Laporan Follower (Kapsul)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1a1510;--s1:#211c16;--s2:#2a2318;--s3:#332b1e;--s4:#3d3325;
  --gold:#c9923a;--gold-lt:#e8b06a;--gold-dim:rgba(201,146,58,0.12);--gold-glow:rgba(201,146,58,0.28);
  --cream:#f0e8d8;--cream2:#c8bfad;--muted:#6e6254;--muted2:#4a4036;
  --green:#6aab7a;--green-dim:rgba(106,171,122,0.12);
  --amber:#d4853a;--red:#c05a4a;--blue:#5b8dd9;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0805;font-family:'Outfit',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:40px 20px 60px;gap:14px;}
.page-title{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#3d3325;}
.phone{width:370px;height:800px;background:var(--bg);border-radius:50px;overflow:hidden;position:relative;box-shadow:0 0 0 9px #1e1810,0 0 0 11px #110e09,0 50px 140px rgba(0,0,0,0.95);}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:110px;height:30px;background:#080503;border-radius:18px;z-index:200;}
.sbar{height:50px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 8px;position:relative;z-index:10;}
.sbar-t{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--cream);}
.sbar-r{font-size:10px;color:var(--muted);font-weight:600;}

.scroll{height:calc(800px - 50px);overflow-y:auto;padding-bottom:30px;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

/* HEADER */
.header{padding:12px 20px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--s2);position:sticky;top:0;background:rgba(26,21,16,0.95);backdrop-filter:blur(10px);z-index:50;}
.back-btn{width:32px;height:32px;border-radius:10px;background:var(--s1);border:1px solid var(--s3);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.back-btn svg{width:16px;height:16px;stroke:var(--cream2);stroke-width:2;fill:none;}
.h-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:800;color:var(--cream);}

/* FORM STYLES - MODE KAPSUL */
.form-container{padding:24px 20px;}
.fg{margin-bottom:20px;}
.fg-label{display:block;font-size:11px;font-weight:700;color:var(--cream2);margin-bottom:8px;padding-left:14px;letter-spacing:0.02em;}
.fg-label span{font-weight:400;font-size:9px;color:var(--muted);}
.fg-label .req{color:var(--gold);}

/* Input Kapsul */
.input-box{display:flex;align-items:center;position:relative;transition:all 0.2s;background:var(--s1);border:1px solid transparent;border-radius:100px;height:52px;padding:0 20px;}
.input-box:focus-within{background:rgba(201,146,58,0.06);border-color:var(--gold);}
.input-box:focus-within .input-icon{stroke:var(--gold);}
.input-icon{width:16px;height:16px;stroke:var(--muted);stroke-width:2;fill:none;flex-shrink:0;margin-right:12px;transition:stroke 0.2s;}

.input-box input, .input-box select{width:100%;height:100%;background:transparent;border:none;color:var(--cream);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;outline:none;}
.input-box input::placeholder{color:var(--muted2);}
.input-box select{appearance:none;cursor:pointer;}
.chevron{position:absolute;right:20px;pointer-events:none;width:14px;height:14px;stroke:var(--muted);stroke-width:2;fill:none;}

/* Textarea Kapsul */
.textarea-box{background:var(--s1);border:1px solid transparent;border-radius:24px;padding:16px 20px;transition:all 0.2s;}
.textarea-box:focus-within{background:rgba(201,146,58,0.06);border-color:var(--gold);}
.textarea-box textarea{width:100%;background:transparent;border:none;color:var(--cream);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;outline:none;min-height:80px;resize:none;line-height:1.5;}
.textarea-box textarea::placeholder{color:var(--muted2);}
.char-count{text-align:right;font-size:9px;color:var(--muted);margin-top:6px;padding-right:14px;}

/* Upload Kapsul */
.upload-grid{display:flex;gap:10px;}
.upload-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:none;background:var(--s2);border-radius:100px;cursor:pointer;transition:all 0.2s;}
.upload-btn:hover, .upload-btn:active{background:var(--gold-dim);}
.upload-btn svg{width:18px;height:18px;stroke:var(--muted);stroke-width:1.8;fill:none;transition:stroke 0.2s;}
.upload-btn:hover svg, .upload-btn:active svg{stroke:var(--gold);}
.upload-text{color:var(--cream2);font-size:11px;font-weight:700;transition:color 0.2s;}
.upload-btn:hover .upload-text, .upload-btn:active .upload-text{color:var(--gold);}

/* Helpers */
.hint{font-size:9px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:4px;padding-left:14px;}

/* Submit Button */
.submit-btn{width:100%;height:56px;background:linear-gradient(135deg,var(--gold),var(--amber));border:none;border-radius:100px;color:#1a0e00;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:24px;cursor:pointer;box-shadow:0 8px 20px var(--gold-glow);transition:all 0.2s;}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 10px 25px var(--gold-glow);}
.submit-btn:active{transform:scale(0.97);box-shadow:0 4px 10px var(--gold-glow);}
.submit-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.5;fill:none;}

/* Animation for interactions */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
.form-container > * {
  animation: fadeIn 0.4s ease forwards;
  opacity: 0;
}
.form-container > *:nth-child(1) { animation-delay: 0.05s; }
.form-container > *:nth-child(2) { animation-delay: 0.1s; }
.form-container > *:nth-child(3) { animation-delay: 0.15s; }
.form-container > *:nth-child(4) { animation-delay: 0.2s; }
.form-container > *:nth-child(5) { animation-delay: 0.25s; }
.form-container > *:nth-child(6) { animation-delay: 0.3s; }
</style>
</head>
<body>
<div class="page-title">Form Input · Kapsul Mode</div>
<div class="phone">
  <div class="island"></div>
  <div class="sbar"><span class="sbar-t">15:57</span><span class="sbar-r">4G 57%</span></div>
  
  <div class="scroll">
    <!-- Header -->
    <div class="header">
      <div class="back-btn"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
      <div class="h-title">Laporan Follower</div>
    </div>

    <div class="form-container">
      
      <!-- Platform -->
      <div class="fg">
        <label class="fg-label">Platform <span class="req">*</span></label>
        <div class="input-box">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <select>
            <option value="tiktok">TikTok</option>
            <option value="instagram">Instagram</option>
            <option value="facebook">Facebook</option>
          </select>
          <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <!-- Username -->
      <div class="fg">
        <label class="fg-label">Username Follower <span class="req">*</span></label>
        <div class="input-box">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" placeholder="contoh: budisantoso">
        </div>
        <div class="hint">Sistem akan otomatis menambahkan @</div>
      </div>

      <!-- Jumlah Follower -->
      <div class="fg">
        <label class="fg-label">Jumlah Follower Saat Ini <span>(Opsional)</span></label>
        <div class="input-box">
          <svg class="input-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <input type="number" placeholder="0">
        </div>
      </div>

      <!-- Screenshot -->
      <div class="fg">
        <label class="fg-label">Screenshot Bukti <span>(Opsional)</span></label>
        <div class="upload-grid">
          <div class="upload-btn">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <div class="upload-text">Pilih Foto</div>
          </div>
          <div class="upload-btn">
            <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <div class="upload-text">Ambil Foto</div>
          </div>
        </div>
      </div>

      <!-- Catatan -->
      <div class="fg">
        <label class="fg-label">Catatan <span>(Opsional)</span></label>
        <div class="textarea-box">
          <textarea placeholder="Contoh: Follower dari video unboxing..."></textarea>
        </div>
        <div class="char-count">0/500</div>
      </div>

      <!-- Submit -->
      <button class="submit-btn">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Kirim Laporan
      </button>

    </div>
  </div>
</div>
</body>
</html>
